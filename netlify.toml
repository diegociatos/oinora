# =================================================
# Oi Nora · configuração de deploy Netlify
# =================================================
# O app Next.js está no subdiretório oinora/.
# Não especificamos "publish" — o plugin @netlify/plugin-nextjs cuida disso.

[build]
  base    = "oinora"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Plugin obrigatório para SSR/Server Components/App Router funcionarem.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers de segurança aplicados a todas as respostas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
